services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: editorial_db
    restart: always
    environment:
      POSTGRES_DB: editorial_db
      POSTGRES_USER: editorial_user
      POSTGRES_PASSWORD: editorial_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: editorial_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@editorial.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres


volumes:
  postgres_data:
